steps:
  # ── 1. Build the Docker image and push to Artifact Registry ───────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-push
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA'
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
      - --cache-from
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
      - .
    dir: '.'

  # ── 2. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - aura-sde-interview-agent
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --quiet
    waitFor:
      - build-push

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 900s

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
