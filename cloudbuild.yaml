steps:
  # ── 1. Build the Docker image locally in the build worker ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA'
      - --tag
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
      - --cache-from
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
      - .
    dir: '.'

  # ── 2. Push the revision image so Cloud Run can deploy it ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-commit
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA'
    waitFor:
      - build

  # ── 3. Update latest after the revision image exists in the registry ──────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args:
      - push
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
    waitFor:
      - build

  # ── 4. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - aura-sde-interview-agent
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --quiet
    waitFor:
      - push-commit

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 900s

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/aura/aura-backend:latest'
