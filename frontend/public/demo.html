<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura — Google SDE Interview Coach</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#f5f4f2;
  --surface:#ffffff;
  --surface2:#f0efed;
  --border:rgba(0,0,0,0.07);
  --border2:rgba(0,0,0,0.11);
  --tx1:#111110;
  --tx2:#6b6a67;
  --tx3:#a8a6a0;
  --accent:#1d4ed8;
  --green:#15803d;
  --amber:#b45309;
  --red:#b91c1c;
  --user-bg:#111110;
  --agent-bg:#f0efed;
  --shadow-md:0 4px 20px rgba(0,0,0,0.07),0 1px 5px rgba(0,0,0,0.04);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.10),0 4px 14px rgba(0,0,0,0.05);
}

html,body {
  height:100%;width:100%;
  font-family:'Geist',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tx1);
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
}

.card {
  width:min(880px,calc(100vw - 32px));
  height:min(720px,calc(100vh - 32px));
  background:var(--surface);
  border-radius:20px;
  border:1px solid var(--border2);
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;
}

.hdr {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:8px;}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.hdr-name{font-size:13px;font-weight:500;letter-spacing:-0.01em;}
.hdr-sub{font-size:12px;color:var(--tx3);font-family:'Geist Mono',monospace;}

.pill {
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--border2);background:var(--bg);
  font-size:11px;font-family:'Geist Mono',monospace;color:var(--tx2);
  transition:all .3s;
}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--tx3);transition:background .3s;}
.pill.ready .pill-dot{background:var(--green);}
.pill.listening .pill-dot{background:var(--accent);animation:blink 1s ease-in-out infinite;}
.pill.speaking .pill-dot{background:var(--amber);animation:blink .7s ease-in-out infinite;}
.pill.error .pill-dot{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.body{display:flex;flex:1;overflow:hidden;}

.left {
  width:220px;flex-shrink:0;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:22px;padding:28px 20px;
}

.mic-wrap{
  position:relative;width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid transparent;
  transition:opacity .4s,transform .4s;
  opacity:0;pointer-events:none;
}
.ring-1{border-color:rgba(29,78,216,.22);}
.ring-2{border-color:rgba(29,78,216,.13);}
.ring-3{border-color:rgba(29,78,216,.07);}

.state-listening .ring-1{opacity:1;transform:scale(1.42);animation:pring 1.9s ease-out infinite;}
.state-listening .ring-2{opacity:1;transform:scale(1.63);animation:pring 1.9s ease-out .22s infinite;}
.state-listening .ring-3{opacity:1;transform:scale(1.82);animation:pring 1.9s ease-out .44s infinite;}
.state-speaking .ring-1{opacity:1;transform:scale(1.38);animation:pring 1.1s ease-out infinite;border-color:rgba(180,83,9,.28);}
.state-speaking .ring-2{opacity:1;transform:scale(1.57);animation:pring 1.1s ease-out .15s infinite;border-color:rgba(180,83,9,.15);}
.state-speaking .ring-3{opacity:1;transform:scale(1.76);animation:pring 1.1s ease-out .30s infinite;border-color:rgba(180,83,9,.08);}
@keyframes pring{0%{opacity:.7}70%{opacity:.15}100%{opacity:0}}

.mic-btn {
  position:relative;z-index:2;
  width:76px;height:76px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface);
  box-shadow:var(--shadow-md);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .18s,box-shadow .18s,background .25s,border-color .25s;outline:none;
}
.mic-btn:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,.10);}
.mic-btn:active{transform:scale(.96);}
.mic-btn svg{width:26px;height:26px;color:var(--tx2);transition:color .25s;}

.mic-btn.listening{background:var(--accent);border-color:transparent;box-shadow:0 4px 20px rgba(29,78,216,.38);}
.mic-btn.listening svg{color:#fff;}
.mic-btn.speaking{background:var(--tx1);border-color:transparent;box-shadow:0 4px 20px rgba(0,0,0,.22);}
.mic-btn.speaking svg{color:#fff;}

.waveform{
  display:flex;align-items:center;gap:3px;height:24px;
  opacity:0;transition:opacity .4s;
}
.waveform.active{opacity:1;}
.bar{width:3px;min-height:3px;border-radius:2px;background:var(--accent);}
.state-listening .bar{animation:wv var(--d,.6s) ease-in-out infinite var(--del,0s);}
.state-speaking .bar{background:var(--amber);animation:wv var(--d,.5s) ease-in-out infinite var(--del,0s);}
@keyframes wv{0%,100%{height:3px}50%{height:var(--h,18px)}}

.info-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.timer{font-size:18px;font-weight:500;font-family:'Geist Mono',monospace;color:var(--tx2);letter-spacing:.04em;}
.state-label{font-size:11px;color:var(--tx3);}

.action-btn {
  width:100%;padding:9px 0;border-radius:10px;
  border:1px solid var(--border2);background:var(--tx1);color:#fff;
  font-family:'Geist',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .2s,color .2s,border-color .2s;
  letter-spacing:-.01em;
}
.action-btn:hover{background:#2d2d2b;}
.action-btn.connected{background:var(--surface);color:var(--red);border-color:rgba(185,28,28,.22);}
.action-btn.connected:hover{background:#fff5f5;}

.user-id-row{width:100%;display:flex;flex-direction:column;gap:4px;}
.user-id-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);font-family:'Geist Mono',monospace;}
.user-id-field{display:flex;gap:5px;}
.user-id-input{
  flex:1;padding:7px 10px;border-radius:8px;
  border:1px solid var(--border2);background:var(--bg);
  font-family:'Geist Mono',monospace;font-size:12px;color:var(--tx1);
  outline:none;transition:border-color .2s;
}
.user-id-input:focus{border-color:var(--accent);}
.user-id-set-btn{
  padding:7px 10px;border-radius:8px;
  border:1px solid var(--border2);background:var(--tx1);color:#fff;
  font-family:'Geist',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:background .2s;
}
.user-id-set-btn:hover{background:#2d2d2b;}
.user-id-set-btn:disabled{opacity:.38;cursor:not-allowed;}
.user-name-badge{
  font-size:11px;color:var(--accent);font-weight:500;
  min-height:14px;text-align:center;
}

.right{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.tx-hdr{
  padding:11px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.tx-hdr-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);font-family:'Geist Mono',monospace;}
.clear-btn{font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;font-family:'Geist',sans-serif;transition:color .2s;}
.clear-btn:hover{color:var(--tx1);}

.messages{
  flex:1;overflow-y:auto;
  padding:18px 20px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--tx3);
}
.empty svg{width:28px;height:28px;opacity:.3;}
.empty-text{font-size:13px;}

.msg{display:flex;flex-direction:column;gap:3px;animation:fadein .22s cubic-bezier(.4,0,.2,1);}
@keyframes fadein{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-items:flex-end;}
.msg.agent{align-items:flex-start;}
.msg-role{font-size:10px;font-family:'Geist Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:0 4px;}
.bubble{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.55;word-break:break-word;}
.msg.user .bubble{background:var(--user-bg);color:#fff;border-bottom-right-radius:3px;}
.msg.agent .bubble{background:var(--agent-bg);color:var(--tx1);border-bottom-left-radius:3px;}

.typing-wrap{display:flex;flex-direction:column;gap:3px;animation:fadein .22s cubic-bezier(.4,0,.2,1);}
.typing-wrap .msg-role{font-size:10px;font-family:'Geist Mono',monospace;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:0 4px;}
.typing-bubble{background:var(--agent-bg);padding:10px 14px;border-radius:14px;border-bottom-left-radius:3px;display:inline-flex;align-items:center;gap:4px;}
.typing-bubble span{width:6px;height:6px;border-radius:50%;background:var(--tx3);animation:tdot .9s ease-in-out infinite;}
.typing-bubble span:nth-child(2){animation-delay:.18s;}
.typing-bubble span:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.interim-bubble{padding:10px 14px;border-radius:14px;display:inline-flex;align-items:center;font-style:italic;max-width:82%;line-height:1.55;word-break:break-word;}
.msg.agent .interim-bubble{background:var(--agent-bg);color:var(--tx2);border-bottom-left-radius:3px;}
.msg.user .interim-bubble{background:rgba(17,17,16,.78);color:#fff;border-bottom-right-radius:3px;}

.partial{
  padding:7px 20px;border-top:1px solid var(--border);
  flex-shrink:0;min-height:34px;
  display:flex;align-items:center;gap:6px;
}
.partial-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:blink 1s infinite;}
.partial-text{font-size:12.5px;color:var(--tx3);font-style:italic;}

.metrics {
  display:flex;
  align-items:stretch;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
  min-height:74px;
}
.m-tokens {display:flex;align-items:stretch;border-left:1px solid var(--border);}
.m-tokens .m-cell {min-width:60px;}
.m-tokens .m-cell + .m-cell {border-left:1px solid var(--border);}
.m-cell {display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 10px;flex:1;}
.m-pipeline {flex:3;display:flex;align-items:center;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.m-pipeline .m-cell {border-left:none;}
.m-cell.e2e {background:var(--surface2);border-left:1px solid var(--border);}
.m-label {font-size:8.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3) !important;white-space:nowrap;}
.m-numrow {display:flex;align-items:baseline;gap:2px;line-height:1;}
.m-val {font-size:15px;font-weight:500;font-family:'Geist Mono',monospace;color:var(--tx2);transition:color .5s;min-width:2ch;text-align:center;}
.m-unit {font-size:8.5px;font-family:'Geist Mono',monospace;color:var(--tx3) !important;}
.m-val.good { color:var(--green); }
.m-val.ok { color:var(--amber); }
.m-val.slow { color:var(--red); }
.m-track {width:calc(100% - 8px);height:2px;background:var(--border2);border-radius:1px;overflow:hidden;}
.m-fill {height:100%;border-radius:1px;width:0%;transition:width .7s cubic-bezier(.4,0,.2,1), background .5s;background:var(--tx3);}
.m-fill.good { background:var(--green); }
.m-fill.ok { background:var(--amber); }
.m-fill.slow { background:var(--red); }
.m-breakdown{display:flex;flex-direction:column;gap:2px;width:calc(100% - 8px);margin-top:1px;}
.m-breakdown-item{font-size:8px;font-family:'Geist Mono',monospace;color:var(--tx3);display:flex;justify-content:space-between;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.85;}
.m-breakdown-item span{color:var(--tx2);}



#audio-host {
  position:fixed;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;
}

@media (max-width:640px) {
  html,body{align-items:stretch;justify-content:stretch;overflow:hidden;}
  .card{width:100%;height:100%;border-radius:0;border:none;box-shadow:none;}
  .body{flex-direction:column;}
  .left{width:100%;height:auto;flex-direction:row;flex-shrink:0;border-right:none;border-bottom:1px solid var(--border);padding:10px 14px;gap:14px;justify-content:flex-start;align-items:center;}
  .mic-wrap{width:52px;height:52px;flex-shrink:0;}
  .mic-btn{width:52px;height:52px;}
  .mic-btn svg{width:20px;height:20px;}
  .ring{display:none;}
  .waveform{display:none;}
  .info-col{align-items:flex-start;gap:2px;flex:1;}
  .timer{font-size:15px;}
  .state-label{font-size:11px;}
  .action-btn{width:auto;padding:8px 18px;white-space:nowrap;flex-shrink:0;}
  .metrics{overflow-x:auto;flex-wrap:nowrap;height:60px;}
  .m-cell{min-width:52px;flex-shrink:0;}
  .m-pipeline{flex-shrink:0;}
  .m-tokens{flex-shrink:0;}
  .m-label{font-size:7.5px;}
  .m-val{font-size:12px;}
  .m-unit{font-size:7.5px;}
}
@media (max-width:380px) {
  .hdr-sub{display:none;}
  .m-tokens{display:none;}
}
</style>
</head>
<body>
<div class="card" id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-dot"></div>
      <span class="hdr-name">Aura</span>
      <span class="hdr-sub">/ Google SDE Interview Coach</span>
    </div>
    <div class="pill" id="pill">
      <div class="pill-dot"></div>
      <span id="pill-text">idle</span>
    </div>
  </div>

  <div class="body">
    <div class="left">
      <div class="mic-wrap state-idle" id="mic-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <button class="mic-btn idle" id="mic-btn" onclick="toggleConnect()" title="Connect / Disconnect (Space)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>

      <div class="waveform" id="waveform">
        <div class="bar" style="--d:.55s;--del:0s;--h:16px"></div>
        <div class="bar" style="--d:.62s;--del:.07s;--h:22px"></div>
        <div class="bar" style="--d:.48s;--del:.14s;--h:12px"></div>
        <div class="bar" style="--d:.66s;--del:.21s;--h:20px"></div>
        <div class="bar" style="--d:.53s;--del:.28s;--h:14px"></div>
        <div class="bar" style="--d:.59s;--del:.35s;--h:18px"></div>
        <div class="bar" style="--d:.64s;--del:.42s;--h:10px"></div>
        <div class="bar" style="--d:.52s;--del:.49s;--h:16px"></div>
      </div>

      <div class="info-col">
        <span class="timer" id="timer">00:00</span>
        <span class="state-label" id="state-label">press connect to start</span>
      </div>

      <div class="user-id-row">
        <span class="user-id-label">Candidate ID</span>
        <div class="user-id-field">
          <input class="user-id-input" id="user-id-input" type="text" maxlength="32" placeholder="e.g. alice or c001" />
          <button class="user-id-set-btn" id="user-id-set-btn" onclick="setUserId()" title="Set candidate ID">Set</button>
        </div>
        <span class="user-name-badge" id="user-name-badge">&nbsp;</span>
      </div>

      <button class="action-btn" id="action-btn" onclick="toggleConnect()">Connect</button>
    </div>

    <div class="right">
      <div class="tx-hdr">
        <span class="tx-hdr-label">Transcript</span>
        <button class="clear-btn" onclick="clearTranscript()">Clear</button>
      </div>

      <div class="messages" id="messages">
        <div class="empty" id="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="empty-text">Conversation will appear here</span>
        </div>
      </div>

      <div class="partial" id="partial-row" style="display:none">
        <div class="partial-dot"></div>
        <span class="partial-text" id="partial-text"></span>
      </div>


    </div>
  </div>

  <div class="metrics">
    <div class="m-cell">
      <span class="m-label">UI ↔ Server</span>
      <div class="m-numrow">
        <span class="m-val" id="m-ping">--</span>
        <span class="m-unit">ms</span>
      </div>
      <div class="m-track"><div class="m-fill" id="mb-ping"></div></div>
    </div>

    <div class="m-pipeline">
      <div class="m-cell">
        <span class="m-label">Response</span>
        <div class="m-numrow">
          <span class="m-val" id="m-sts">--</span>
          <span class="m-unit">ms</span>
        </div>
        <div class="m-track"><div class="m-fill" id="mb-sts"></div></div>
        <div class="m-breakdown" id="m-breakdown"></div>
      </div>
      <div class="m-cell">
        <span class="m-label">Server to UI</span>
        <div class="m-numrow">
          <span class="m-val" id="m-serverui">--</span>
          <span class="m-unit">ms</span>
        </div>
        <div class="m-track"><div class="m-fill" id="mb-serverui"></div></div>
      </div>
    </div>

    <div class="m-cell e2e">
      <span class="m-label">End-to-End</span>
      <div class="m-numrow">
        <span class="m-val" id="m-e2e">--</span>
        <span class="m-unit">ms</span>
      </div>
      <div class="m-track"><div class="m-fill" id="mb-e2e"></div></div>
    </div>

    <div class="m-tokens">
      <div class="m-cell">
        <span class="m-label">Prompt tok</span>
        <div class="m-numrow"><span class="m-val" id="m-tok-prompt">--</span></div>
        <div class="m-track"><div class="m-fill" id="mb-tok-prompt" style="background:var(--tx3)"></div></div>
      </div>
      <div class="m-cell">
        <span class="m-label">Reply tok</span>
        <div class="m-numrow"><span class="m-val" id="m-tok-completion">--</span></div>
        <div class="m-track"><div class="m-fill" id="mb-tok-completion" style="background:var(--tx3)"></div></div>
      </div>
      <div class="m-cell" style="background:var(--surface2)">
        <span class="m-label">Session tok</span>
        <div class="m-numrow"><span class="m-val" style="font-size:13px" id="m-tok-session">--</span></div>
        <div class="m-track"><div class="m-fill" id="mb-tok-session" style="background:var(--tx3)"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="audio-host" aria-hidden="true">
  <audio id="bot-audio" autoplay playsinline></audio>
</div>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const el = id => document.getElementById(id);
const micWrap = el('mic-wrap');
const micBtn = el('mic-btn');
const pill = el('pill');
const pillText = el('pill-text');
const waveform = el('waveform');
const timerEl = el('timer');
const stateLabel = el('state-label');
const actionBtn = el('action-btn');
const messages = el('messages');
const partialRow = el('partial-row');
const partialTxt = el('partial-text');
const botAudio = el('bot-audio');
const userIdInput = el('user-id-input');
const userNameBadge = el('user-name-badge');
const userIdSetBtn = el('user-id-set-btn');

// Candidate ID helpers
// user_id is whatever the candidate types — stored as-is in VertexAiSessionService
// so the same ID across sessions means Aura remembers all previous rounds.

userIdInput?.addEventListener('input', () => {
  const val = userIdInput.value.trim();
  userNameBadge.textContent = val ? `candidate: ${val}` : '\u00a0';
});

function getCandidateId() {
  const raw = (userIdInput?.value || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-');
  return raw || 'anonymous';
}

function setUserId() {
  const candidateId = getCandidateId();
  if (candidateId === 'anonymous') return;
  userNameBadge.textContent = `candidate: ${candidateId}`;
  // If connected, send data channel message to bot
  if (room && appState === 'ready') {
    const msg = JSON.stringify({ type: 'user-id-update', user_id: candidateId });
    const encoded = new TextEncoder().encode(msg);
    room.localParticipant.publishData(encoded, { reliable: true }).catch(console.warn);
    userIdSetBtn.textContent = '✓ Set';
    setTimeout(() => { userIdSetBtn.textContent = 'Set'; }, 2000);
  }
}

const { Room, RoomEvent, Track, ConnectionState } = window.LivekitClient;
const SESSION_URL = '/api/livekit/session';

botAudio.onplaying = captureServerUiLatency;
botAudio.oncanplay = captureServerUiLatency;

let appState = 'idle';
let timerRef = null;
let elapsed = 0;
let room = null;
let botAudioTrack = null;
let pingInterval = null;
let sessionTokens = 0;
let botSpeechStartedAt = null;
let botAudioReadyAt = null;
let serverUiCaptured = false;
let lastUserTranscript = '';
let lastAgentTranscript = '';
let currentAgentTranscript = '';
let userInterimText = '';

const STATE_LABELS = {
  idle: 'press connect to start',
  connecting: 'connecting…',
  ready: 'ready — speak to begin',
  listening: 'listening…',
  speaking: 'agent speaking…',
  error: 'connection error',
};

const METRIC_CFG = {
  ping: { max: 200, good: 60, ok: 130 },
  sts: { max: 3500, good: 900, ok: 2000 },
  serverui: { max: 800, good: 180, ok: 350 },
  e2e: { max: 3500, good: 1000, ok: 1800 },
};
const latency = { ping: null, sts: null, serverui: null, e2e: null };

function setAppState(state) {
  appState = state;
  micWrap.className = `mic-wrap state-${state}`;
  micBtn.className = `mic-btn ${state}`;
  pill.className = `pill ${state}`;
  pillText.textContent = state;
  stateLabel.textContent = STATE_LABELS[state] || state;
  waveform.classList.toggle('active', state === 'listening' || state === 'speaking');
}

function startTimer() {
  elapsed = 0;
  timerEl.textContent = '00:00';
  timerRef = setInterval(() => {
    elapsed += 1;
    timerEl.textContent = String(Math.floor(elapsed / 60)).padStart(2, '0') + ':' + String(elapsed % 60).padStart(2, '0');
  }, 1000);
}

function stopTimer() {
  clearInterval(timerRef);
  timerRef = null;
  timerEl.textContent = '00:00';
}

function setMetric(key, value) {
  latency[key] = value;
  const cfg = METRIC_CFG[key];
  const valEl = el(`m-${key}`);
  const fillEl = el(`mb-${key}`);
  if (!valEl || !fillEl) return;
  valEl.textContent = value;
  fillEl.style.width = Math.min((value / cfg.max) * 100, 100).toFixed(1) + '%';
  const cls = value <= cfg.good ? 'good' : value <= cfg.ok ? 'ok' : 'slow';
  valEl.className = `m-val ${cls}`;
  fillEl.className = `m-fill ${cls}`;
}

function recomputeE2E() {
  const sts = latency.sts;
  const serverui = latency.serverui;
  if (sts !== null && serverui !== null) {
    setMetric('e2e', sts + serverui);
  } else if (sts !== null) {
    setMetric('e2e', sts);
  }
}

function resetMetrics() {
  Object.keys(latency).forEach((key) => {
    latency[key] = null;
    const v = el(`m-${key}`);
    const f = el(`mb-${key}`);
    if (v) {
      v.textContent = '--';
      v.className = 'm-val';
    }
    if (f) {
      f.style.width = '0%';
      f.className = 'm-fill';
    }
  });
  ['m-tok-prompt', 'm-tok-completion', 'm-tok-session'].forEach((id) => {
    const node = el(id);
    if (node) node.textContent = '--';
  });
  ['mb-tok-prompt', 'mb-tok-completion', 'mb-tok-session'].forEach((id) => {
    const node = el(id);
    if (node) node.style.width = '0%';
  });
  botSpeechStartedAt = null;
  botAudioReadyAt = null;
  serverUiCaptured = false;
  sessionTokens = 0;
  const bd = el('m-breakdown');
  if (bd) bd.innerHTML = '';
}

async function pingOnce() {
  const t0 = performance.now();
  try {
    await fetch('/api/health', { cache: 'no-store' });
    setMetric('ping', Math.round(performance.now() - t0));
  } catch (_) {}
}

function startPing() {
  pingOnce();
  pingInterval = setInterval(pingOnce, 2500);
}

function stopPing() {
  clearInterval(pingInterval);
  pingInterval = null;
}

function showAudioUnlock(message) {
  if (message) {
    stateLabel.textContent = message;
  }
}

function hideAudioUnlock() {
}

function captureServerUiLatency() {
  botAudioReadyAt = performance.now();
  if (botSpeechStartedAt === null || serverUiCaptured) return;
  serverUiCaptured = true;
  const delta = Math.round(Math.abs(botAudioReadyAt - botSpeechStartedAt));
  setMetric('serverui', Math.max(1, delta));
  recomputeE2E();
}

function hideEmptyState() {
  const node = el('empty-state');
  if (node) node.remove();
}

function escHtml(value) {
  return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addMsg(role, text) {
  const content = String(text || '').trim();
  if (!content) return;
  clearUserInterim();
  // Only clear agent-interim when committing an agent message.
  // For user messages the agent may still be mid-response — leave it.
  if (role !== 'user') clearAgentInterim();
  removeTyping();
  hideEmptyState();
  const node = document.createElement('div');
  node.className = `msg ${role}`;
  node.innerHTML = `<span class="msg-role">${role === 'user' ? 'You' : 'Aura'}</span><div class="bubble">${escHtml(content)}</div>`;
  messages.appendChild(node);
  messages.scrollTop = messages.scrollHeight;
}

function mergeTranscriptChunk(current, incoming) {
  const previous = normalizeTranscriptText(current);
  const next = normalizeTranscriptText(incoming);

  if (!next) return previous;
  if (!previous) return next;
  if (next === previous) return previous;
  if (next.startsWith(previous)) return next;
  if (previous.startsWith(next)) return previous;
  if (next.includes(previous)) return next;
  if (previous.includes(next)) return previous;
  if (looksLikeSameUtterance(previous, next)) {
    return preferBetterTranscript(previous, next);
  }

  const overlapMax = Math.min(previous.length, next.length);
  for (let size = overlapMax; size > 0; size -= 1) {
    if (previous.slice(-size) === next.slice(0, size)) {
      return `${previous}${next.slice(size)}`.trim();
    }
  }

  if (/\w$/.test(previous) && /^\w/.test(next)) {
    return `${previous} ${next}`.trim();
  }

  return `${previous}${next}`.trim();
}

function canonicalizeTranscriptText(text) {
  return normalizeTranscriptText(text).toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function sharedPrefixLength(left, right) {
  const limit = Math.min(left.length, right.length);
  let index = 0;
  while (index < limit && left[index] === right[index]) {
    index += 1;
  }
  return index;
}

function looksLikeSameUtterance(current, incoming) {
  const previous = canonicalizeTranscriptText(current);
  const next = canonicalizeTranscriptText(incoming);

  if (!previous || !next) return false;
  if (previous === next) return true;
  if (previous.includes(next) || next.includes(previous)) return true;

  const prefix = sharedPrefixLength(previous, next);
  if (prefix >= Math.floor(Math.min(previous.length, next.length) * 0.7)) {
    return true;
  }

  return similarityRatio(previous, next) >= 0.72;
}

function preferBetterTranscript(current, incoming) {
  const previous = normalizeTranscriptText(current);
  const next = normalizeTranscriptText(incoming);
  if (!previous) return next;
  if (!next) return previous;
  return next.length > previous.length ? next : previous;
}

function similarityRatio(left, right) {
  if (!left || !right) return 0;
  const longer = left.length >= right.length ? left : right;
  const shorter = left.length >= right.length ? right : left;
  const limit = Math.min(longer.length, shorter.length);
  let matches = 0;
  for (let index = 0; index < limit; index += 1) {
    if (longer[index] === shorter[index]) {
      matches += 1;
    }
  }
  return matches / longer.length;
}

function commitCurrentAgentMessage() {
  const node = el('agent-final-current');
  if (!node) {
    currentAgentTranscript = '';
    return;
  }

  node.removeAttribute('id');
  lastAgentTranscript = normalizeTranscriptText(currentAgentTranscript || node.textContent || '');
  currentAgentTranscript = '';
}

function upsertAgentFinal(text) {
  const content = normalizeTranscriptText(text);
  if (!content) return;
  if (content === lastAgentTranscript) return;

  lastAgentTranscript = content;
  currentAgentTranscript = content;
  removeTyping();

  // Promote the interim node in-place to avoid the remove+re-add flash.
  const interim = el('agent-interim');
  if (interim) {
    const bubble = interim.querySelector('.interim-bubble');
    if (bubble) {
      bubble.className = 'bubble';
      bubble.textContent = content;
    }
    interim.removeAttribute('id');
  } else {
    addMsg('agent', content);
  }
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  removeTyping();
  hideEmptyState();
  const node = document.createElement('div');
  node.id = 'typing';
  node.className = 'typing-wrap';
  node.innerHTML = `<span class="msg-role">Aura</span><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  messages.appendChild(node);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const node = el('typing');
  if (node) node.remove();
}

function normalizeTranscriptText(text) {
  return (text || '').replace(/\s+/g, ' ').trim();
}

function showAgentInterim(text) {
  removeTyping();
  hideEmptyState();

  const content = normalizeTranscriptText(text);
  if (!content) return;

  let node = el('agent-interim');
  if (!node) {
    node = document.createElement('div');
    node.id = 'agent-interim';
    node.className = 'msg agent';
    node.innerHTML = '<span class="msg-role">Aura</span><div class="interim-bubble"></div>';
    messages.appendChild(node);
  }

  const bubble = node.querySelector('.interim-bubble');
  if (bubble) bubble.textContent = content;
  messages.scrollTop = messages.scrollHeight;
}

function clearAgentInterim() {
  const node = el('agent-interim');
  if (node) node.remove();
}

function showUserInterim(text) {
  hideEmptyState();

  const content = normalizeTranscriptText(text);
  if (!content) return;

  userInterimText = content;

  let node = el('user-interim');
  if (!node) {
    node = document.createElement('div');
    node.id = 'user-interim';
    node.className = 'msg user';
    node.innerHTML = '<span class="msg-role">You</span><div class="interim-bubble"></div>';
    messages.appendChild(node);
  }

  const bubble = node.querySelector('.interim-bubble');
  if (bubble) bubble.textContent = content;
  messages.scrollTop = messages.scrollHeight;
}

function clearUserInterim() {
  const node = el('user-interim');
  if (node) node.remove();
  userInterimText = '';
}

function reconcileUserTranscript(text) {
  let finalText = normalizeTranscriptText(text);
  const interim = normalizeTranscriptText(userInterimText);
  const previous = normalizeTranscriptText(lastUserTranscript);

  if (interim) {
    if (finalText.startsWith(interim)) {
      finalText = interim + finalText.slice(interim.length);
    } else if (interim.endsWith(finalText)) {
      finalText = interim;
    }
  }

  if (previous && finalText.length > previous.length && finalText.toLowerCase().startsWith(previous.toLowerCase())) {
    const suffix = normalizeTranscriptText(finalText.slice(previous.length));
    if (suffix) {
      finalText = suffix;
    }
  }

  return normalizeTranscriptText(finalText);
}

function hidePartial() {
  partialRow.style.display = 'none';
  partialTxt.textContent = '';
}

function clearTranscript() {
  messages.innerHTML = '';
  const empty = document.createElement('div');
  empty.id = 'empty-state';
  empty.className = 'empty';
  empty.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="empty-text">Conversation will appear here</span>`;
  messages.appendChild(empty);
  hidePartial();
  clearUserInterim();
  clearAgentInterim();
  removeTyping();
  lastUserTranscript = '';
  lastAgentTranscript = '';
  currentAgentTranscript = '';
}

function detachBotAudio() {
  if (botAudioTrack) {
    try {
      botAudioTrack.detach(botAudio);
    } catch (_) {}
    botAudioTrack = null;
  }
  botAudio.pause();
  botAudio.srcObject = null;
  hideAudioUnlock();
}

async function attachBotTrack(track) {
  detachBotAudio();
  botAudioTrack = track;
  track.attach(botAudio);
  botAudio.muted = false;
  botAudio.volume = 1;
  try {
    await botAudio.play();
    hideAudioUnlock();
  } catch (_) {
    showAudioUnlock('audio unavailable');
  }
}

function ensureParticipantAudioSubscriptions(participant) {
  if (!participant || !participant.audioTrackPublications) {
    return;
  }

  participant.audioTrackPublications.forEach((publication) => {
    try {
      publication.setSubscribed(true);
    } catch (_) {}

    if (publication.track && publication.track.kind === Track.Kind.Audio) {
      void attachBotTrack(publication.track);
    }
  });
}

function ensureRoomAudioSubscriptions(activeRoom) {
  activeRoom.remoteParticipants.forEach((participant) => {
    ensureParticipantAudioSubscriptions(participant);
  });
}

async function resumeAudioPlayback() {
  if (!room) {
    return;
  }
  try {
    await room.startAudio();
    await botAudio.play();
    hideAudioUnlock();
    stateLabel.textContent = room.canPlaybackAudio ? 'ready — speak to begin' : stateLabel.textContent;
  } catch (error) {
    stateLabel.textContent = error instanceof Error ? error.message : 'audio playback is still blocked';
  }
}

function handleMetrics(data) {
  const tokens = Array.isArray(data?.tokens) ? data.tokens : [];

  if (tokens.length > 0) {
    const token = tokens[0];
    const prompt = token.prompt_tokens || 0;
    const completion = token.completion_tokens || 0;
    sessionTokens += prompt + completion;
    el('m-tok-prompt').textContent = prompt;
    el('m-tok-completion').textContent = completion;
    el('m-tok-session').textContent = sessionTokens;
    el('mb-tok-prompt').style.width = Math.min((prompt / 500) * 100, 100).toFixed(1) + '%';
    el('mb-tok-completion').style.width = Math.min((completion / 200) * 100, 100).toFixed(1) + '%';
    el('mb-tok-session').style.width = Math.min((sessionTokens / 3000) * 100, 100).toFixed(1) + '%';
  }
}

function handleServerEvent(message) {
  switch (message.type) {
    case 'status':
      if (message.message) {
        stateLabel.textContent = String(message.message);
      }
      break;
    case 'user-started-speaking':
      clearUserInterim();
      setAppState('listening');
      break;
    case 'user-stopped-speaking':
      // User has finished speaking — stay in listening while waiting for bot response
      // (typing dots will appear when user-transcription-final fires)
      break;
    case 'interruption':
      // User interrupted the bot — clear agent bubble immediately, go to listening
      clearAgentInterim();
      removeTyping();
      setAppState('listening');
      break;
    case 'user-transcription': {
      const text = normalizeTranscriptText(message.data?.text || '');
      const final = message.data?.final ?? false;
      if (final) {
        clearUserInterim();
        const finalText = reconcileUserTranscript(text);
        if (finalText && finalText !== lastUserTranscript) {
          lastUserTranscript = finalText;
          addMsg('user', finalText);
        }
        // Only show typing dots if bot hasn't started responding yet.
        // In native-audio mode the bot usually starts speaking before
        // user-transcription-final arrives, so dots are rarely needed.
        if (!el('agent-interim') && !el('typing')) showTyping();
      } else {
        showUserInterim(text);
      }
      break;
    }
    case 'bot-started-speaking':
      commitCurrentAgentMessage();
      removeTyping();
      // Do NOT clear user-interim here — the user's in-progress text stays
      // visible until user-transcription-final commits it at turn_complete.
      clearAgentInterim();  // Clear any stale agent-interim from previous turn
      botSpeechStartedAt = performance.now();
      serverUiCaptured = false;
      if (botAudioReadyAt !== null) {
        captureServerUiLatency();
      }
      setAppState('speaking');
      break;
    case 'bot-stopped-speaking':
      botSpeechStartedAt = null;
      botAudioReadyAt = null;
      serverUiCaptured = false;
      setAppState(room ? 'ready' : 'idle');
      break;
    case 'bot-llm-text': {
      const text = normalizeTranscriptText(message.data?.text || '');
      if (text) showAgentInterim(text);
      break;
    }
    case 'bot-transcription': {
      const text = normalizeTranscriptText(message.data?.text || '');
      const final = message.data?.final ?? true;
      if (final) {
        upsertAgentFinal(text);
      } else {
        showAgentInterim(text);
      }
      break;
    }
    case 'latency': {
      const ms = message.data?.total_ms;
      if (typeof ms === 'number') {
        setMetric('sts', ms);
        recomputeE2E();
      }
      break;
    }
    case 'latency-breakdown': {
      const events = message.data?.events;
      if (Array.isArray(events) && events.length > 0) {
        console.debug('[latency-breakdown]', events.join(' | '));
        const bd = el('m-breakdown');
        if (bd) {
          bd.innerHTML = events.map((e) => {
            // e.g. "User turn: 0.601s" or "AzureRealtimeLLMService#0: TTFB 0.536s"
            const colonIdx = e.indexOf(':');
            const rawLabel = colonIdx > -1 ? e.slice(0, colonIdx).trim() : e;
            const rawVal   = colonIdx > -1 ? e.slice(colonIdx + 1).trim() : '';
            const label = rawLabel
              .replace(/AzureRealtimeLLMService#\d+/, 'LLM')
              .replace(/User turn/, 'Turn wait')
              .replace(/#\d+/, '');
            const valMs = rawVal ? rawVal.replace(/(\d+\.\d+)s/, (_, n) => Math.round(parseFloat(n) * 1000) + 'ms') : '';
            return `<div class="m-breakdown-item">${label}<span>${valMs}</span></div>`;
          }).join('');
        }
      }
      break;
    }
    case 'first-bot-speech-latency': {
      const ms = message.data?.total_ms;
      if (typeof ms === 'number') {
        console.info(`[first-bot-speech] ${ms}ms`);
      }
      break;
    }
    case 'metrics':
      handleMetrics(message.data || {});
      break;
    case 'user-identity-set': {
      const { user_id, name } = message.data || {};
      if (name) {
        userNameBadge.textContent = name;
        if (userIdInput && user_id) { userIdInput.value = user_id; userNameBadge.textContent = `candidate: ${user_id}`; }
        console.info(`[identity] resolved: ${name} (${user_id})`);
      }
      break;
    }
    case 'turn-started':
      console.debug(`[turn] #${message.data?.turn} started`);
      break;
    case 'turn-ended':
      console.debug(`[turn] #${message.data?.turn} ${message.data?.interrupted ? 'interrupted' : 'completed'} (${message.data?.duration_secs}s)`);
      break;
    default:
      break;
  }
}

function bindRoomEvents(activeRoom) {
  activeRoom.on(RoomEvent.ConnectionStateChanged, (state) => {
    if (state === ConnectionState.Connected && appState === 'connecting') {
      setAppState('ready');
      ensureRoomAudioSubscriptions(activeRoom);
    }
    if (state === ConnectionState.Disconnected) {
      handleDisconnect(false);
    }
  });

  activeRoom.on(RoomEvent.ParticipantConnected, (participant) => {
    ensureParticipantAudioSubscriptions(participant);
  });

  activeRoom.on(RoomEvent.TrackPublished, (publication, participant) => {
    if (publication.kind === Track.Kind.Audio) {
      try {
        publication.setSubscribed(true);
      } catch (_) {}
      stateLabel.textContent = `subscribing to ${participant.identity} audio…`;
    }
  });

  activeRoom.on(RoomEvent.TrackSubscriptionFailed, (trackSid, participant, error) => {
    stateLabel.textContent = `audio subscribe failed for ${participant.identity}`;
    console.warn('LiveKit audio subscribe failed', trackSid, participant.identity, error);
  });

  activeRoom.on(RoomEvent.AudioPlaybackStatusChanged, async () => {
    if (!activeRoom.canPlaybackAudio) {
      showAudioUnlock('audio unavailable');
      return;
    }
    try {
      await botAudio.play();
      hideAudioUnlock();
    } catch (_) {}
  });

  activeRoom.on(RoomEvent.TrackSubscribed, async (track) => {
    if (track.kind !== Track.Kind.Audio) {
      return;
    }
    await attachBotTrack(track);
    if (!activeRoom.canPlaybackAudio) {
      try {
        await activeRoom.startAudio();
      } catch (_) {
        showAudioUnlock('audio unavailable');
      }
    }
  });

  activeRoom.on(RoomEvent.TrackUnsubscribed, (track) => {
    if (track.kind === Track.Kind.Audio) {
      try {
        track.detach(botAudio);
      } catch (_) {}
      if (botAudioTrack === track) {
        detachBotAudio();
      }
    }
  });

  activeRoom.on(RoomEvent.DataReceived, (payload) => {
    try {
      const text = new TextDecoder().decode(payload);
      handleServerEvent(JSON.parse(text));
    } catch (_) {}
  });
}

function getMicrophoneSupportError() {
  if (!window.isSecureContext) {
    return 'Microphone access requires HTTPS or localhost';
  }
  if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
    return 'This browser cannot access the microphone here. Use HTTPS or localhost.';
  }
  return null;
}

async function connect() {
  setAppState('connecting');
  actionBtn.disabled = true;
  clearTranscript();
  resetMetrics();

  const mediaError = getMicrophoneSupportError();
  if (mediaError) {
    setAppState('error');
    stateLabel.textContent = mediaError;
    actionBtn.disabled = false;
    return;
  }

  try {
    room = new Room();
    bindRoomEvents(room);

    try {
      await room.startAudio();
    } catch (_) {}

    const userId = getCandidateId();
    // Do NOT disable the input — user can update ID during the session

    const response = await fetch(SESSION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: userId === 'anonymous' ? 'Candidate' : `Candidate ${userId}`, user_id: userId }),
    });

    if (!response.ok) {
      throw new Error(`Session bootstrap failed: ${response.status}`);
    }

    const session = await response.json();
    await room.connect(session.livekit_url, session.access_token);
    ensureRoomAudioSubscriptions(room);
    await room.localParticipant.setMicrophoneEnabled(true, {
      autoGainControl: true,
      echoCancellation: true,
      noiseSuppression: true,
    });

    startPing();
    startTimer();
    actionBtn.disabled = false;
    actionBtn.textContent = 'Disconnect';
    actionBtn.classList.add('connected');
    stateLabel.textContent = 'ready — speak to begin';
    setAppState('ready');
    hideAudioUnlock();
  } catch (error) {
    setAppState('error');
    stateLabel.textContent = error instanceof Error ? error.message : 'connection failed';
    actionBtn.disabled = false;
    actionBtn.textContent = 'Connect';
    actionBtn.classList.remove('connected');
    cleanup();
  }
}

function cleanup() {
  detachBotAudio();
  stopPing();
  if (room) {
    try {
      room.disconnect();
    } catch (_) {}
    room = null;
  }
}

function handleDisconnect(shouldCleanup = true) {
  if (shouldCleanup) {
    cleanup();
  } else {
    detachBotAudio();
    stopPing();
    room = null;
  }
  removeTyping();
  hidePartial();
  stopTimer();
  setAppState('idle');
  actionBtn.disabled = false;
  actionBtn.textContent = 'Connect';
  actionBtn.classList.remove('connected');
  if (userIdSetBtn) userIdSetBtn.textContent = 'Set';
}

function toggleConnect() {
  if (appState === 'idle' || appState === 'error') {
    void connect();
  } else {
    handleDisconnect();
  }
}

document.addEventListener('keydown', (event) => {
  if (event.code === 'Space' && event.target === document.body) {
    event.preventDefault();
    toggleConnect();
  }
});

window.addEventListener('beforeunload', () => {
  cleanup();
});
</script>
</body>
</html>
